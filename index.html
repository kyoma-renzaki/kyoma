<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoma Renzaki Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body.show-content .welcome-screen {
            opacity: 0;
            pointer-events: none;
        }

        body.show-content .container {
            opacity: 1;
        }

        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .welcome-content {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .welcome-content:hover {
            transform: scale(1.05);
        }

        .welcome-text {
            font-size: 3em;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.8);
                transform: scale(1.02);
            }
        }

        .welcome-hint {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 20px;
            animation: fade-in-out 2s ease-in-out infinite;
        }

        @keyframes fade-in-out {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.1;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.5);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease 0.5s, transform 0.3s ease;
            transform-style: preserve-3d;
        }

        .container:hover {
            transform: perspective(1000px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
            animation: slideIn 0.8s ease-out;
            transition: transform 0.3s ease;
        }

        .left-section {
            flex-shrink: 0;
        }

        .profile-image-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            animation: float 3s ease-in-out infinite;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-image:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        .profile-image.status-online {
            box-shadow: 0 0 30px rgba(67, 181, 129, 0.6);
            border-color: rgba(67, 181, 129, 0.5);
        }

        .profile-image.status-idle {
            box-shadow: 0 0 30px rgba(250, 166, 26, 0.6);
            border-color: rgba(250, 166, 26, 0.5);
        }

        .profile-image.status-dnd {
            box-shadow: 0 0 30px rgba(240, 71, 71, 0.6);
            border-color: rgba(240, 71, 71, 0.5);
        }

        .profile-image.status-offline {
            box-shadow: 0 0 30px rgba(116, 127, 141, 0.6);
            border-color: rgba(116, 127, 141, 0.5);
        }

        .profile-image.status-offline img {
            filter: grayscale(30%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .status-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 25px;
            height: 25px;
            background: #43b581;
            border-radius: 50%;
            border: 3px solid #000;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .status-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: status-pulse 2s ease-in-out infinite;
        }

        @keyframes status-pulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 currentColor;
                opacity: 0.7;
            }
            50% { 
                box-shadow: 0 0 0 8px currentColor;
                opacity: 0;
            }
        }

        .status-indicator.online {
            background: #43b581;
            color: #43b581;
        }

        .status-indicator.idle {
            background: #faa61a;
            color: #faa61a;
        }

        .status-indicator.idle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50% 50% 50% 0;
            transform: translate(-40%, -40%) rotate(-45deg);
        }

        .status-indicator.dnd {
            background: #f04747;
            color: #f04747;
        }

        .status-indicator.dnd::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 2.5px;
            background: #000;
            border-radius: 2px;
        }

        .status-indicator.offline {
            background: #747f8d;
            color: #747f8d;
        }

        .status-indicator.offline::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border: 2.5px solid #000;
            border-radius: 50%;
            background: transparent;
        }

        .right-section {
            flex: 1;
        }

        .profile-header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.3);
            font-family: monospace;
            overflow: hidden;
            border-right: 3px solid #fff;
            white-space: nowrap;
            animation: typing 6s steps(12) infinite, blink 0.75s step-end infinite;
        }

        @keyframes typing {
            0% { width: 0; }
            40% { width: 100%; }
            60% { width: 100%; }
            100% { width: 0; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .subtitle {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .username {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            margin-left: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .social-icons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            color: #fff;
        }

        .social-icon:hover {
            transform: translateY(-5px);
            border-color: #fff;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
        }

        .info-item {
            color: rgba(255, 255, 255, 0.8);
            margin: 6px 0;
            font-size: 0.95em;
        }

        .info-item i {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .info-item .fa-heart {
            color: rgba(255, 100, 100, 0.8);
        }

        .info-item .fa-heart:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }

        .info-item .fa-heart.liked {
            color: #ff6b6b;
            animation: heart-beat 0.5s ease;
        }

        @keyframes heart-beat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
        }

        .info-item .fa-eye {
            color: rgba(100, 150, 255, 0.8);
        }

        .discord-widget {
            margin-top: 12px;
            padding: 12px;
            background: rgba(88, 101, 242, 0.15);
            border-radius: 10px;
            border: 1px solid rgba(88, 101, 242, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .discord-widget:hover {
            background: rgba(88, 101, 242, 0.25);
            border-color: rgba(88, 101, 242, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-widget:active {
            transform: translateY(0);
        }

        .discord-status {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: #fff;
            font-size: 0.9em;
        }

        .discord-icon {
            font-size: 18px;
            color: #5865F2;
            animation: discord-pulse 2s ease-in-out infinite;
            margin-top: 2px;
            flex-shrink: 0;
        }

        @keyframes discord-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .discord-info {
            flex: 1;
        }

        .discord-status-line {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.online {
            background: rgba(67, 181, 129, 0.2);
            color: #43b581;
            border: 1px solid rgba(67, 181, 129, 0.4);
        }

        .status-badge.idle {
            background: rgba(250, 166, 26, 0.2);
            color: #faa61a;
            border: 1px solid rgba(250, 166, 26, 0.4);
        }

        .status-badge.dnd {
            background: rgba(240, 71, 71, 0.2);
            color: #f04747;
            border: 1px solid rgba(240, 71, 71, 0.4);
        }

        .status-badge.offline {
            background: rgba(116, 127, 141, 0.2);
            color: #747f8d;
            border: 1px solid rgba(116, 127, 141, 0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online { background: #43b581; }
        .status-dot.idle { background: #faa61a; }
        .status-dot.dnd { background: #f04747; }
        .status-dot.offline { background: #747f8d; }

        .discord-link-hint {
            font-size: 0.7em;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            display: block;
        }

        #discordActivity {
            font-size: 0.85em;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            display: none;
        }

        #discordPresence {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
            display: none;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px 30px;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.8s ease-out 0.2s backwards;
            position: relative;
            transition: transform 0.3s ease;
        }

        .music-content {
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        .music-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .album-art {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art.playing {
            animation: rotate-album 10s linear infinite;
        }

        @keyframes rotate-album {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-info {
            flex-shrink: 0;
            min-width: 180px;
            max-width: 220px;
        }

        .song-title {
            font-size: 1em;
            color: #fff;
            margin-bottom: 4px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 0;
        }

        .time-stamps {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8em;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 38px;
            text-align: center;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: visible;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .control-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .control-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .play-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            font-size: 16px;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .volume-control {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 0;
            color: rgba(255, 255, 255, 0.8);
            z-index: 100;
        }

        .volume-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .volume-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        .volume-slider-container {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            margin-left: 5px;
        }

        .volume-control:hover .volume-slider-container {
            width: 100px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }

            .social-icons {
                justify-content: center;
            }

            .music-content {
                flex-direction: column;
                gap: 15px;
            }

            .music-header {
                width: 100%;
                justify-content: center;
            }

            .player-controls {
                width: 100%;
            }

            .song-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content" onclick="enterSite()">
            <div class="welcome-text">Click Here</div>
            <div class="welcome-hint">to enter profile</div>
        </div>
    </div>

    <div class="stars" id="stars"></div>
    
    <div class="volume-control">
        <div class="volume-icon" id="volumeIcon">
            <i class="fas fa-volume-up"></i>
        </div>
        <div class="volume-slider-container">
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>
    
    <div class="container">
        <div class="profile-card">
            <div class="left-section">
                <div class="profile-image-wrapper">
                    <div class="profile-image" id="profileImage">
                        <img id="profileAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Profile">
                    </div>
                    <div class="status-indicator offline" id="statusIndicator"></div>
                </div>
            </div>
            
            <div class="right-section">
                <div class="profile-header">
                    <h1>Kyoma Renzaki</h1>
                    <p class="subtitle">春、夏、秋、冬</p>
                </div>
                
                <div class="username">
                    kyoma_renzaki <span class="badge">オトテン</span>
                </div>
                
                <div class="social-icons">
                    <div class="social-icon discord" title="Discord" data-link="discord">
                        <i class="fab fa-discord"></i>
                    </div>
                    <div class="social-icon facebook" title="Facebook" data-link="facebook">
                        <i class="fab fa-facebook-f"></i>
                    </div>
                    <div class="social-icon instagram" title="Instagram" data-link="instagram">
                        <i class="fab fa-instagram"></i>
                    </div>
                    <div class="social-icon tiktok" title="TikTok" data-link="tiktok">
                        <i class="fab fa-tiktok"></i>
                    </div>
                    <div class="social-icon roblox" title="Roblox" data-link="roblox">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <div class="social-iconlox" title="Rox" data-linoblox">
                        <i class="fas fa-gaad"></i>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="fas fa-heart" id="likeIcon" onclick="toggleLike()"></i> <span id="likeCount">1</span> | 
                    <i class="fas fa-eye"></i> <span id="viewCount">100</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i> Hàm Ninh - Quảng Ninh - Quảng Bình
                </div>

                <div class="discord-widget" id="discordWidget">
                    <div class="discord-status">
                        <i class="fab fa-discord discord-icon"></i>
                        <div class="discord-info">
                            <div class="discord-status-line">
                                <span class="status-badge offline" id="statusBadge">
                                    <span class="status-dot offline" id="statusDot"></span>
                                    <span id="discordStatus">LOADING</span>
                                </span>
                            </div>
                            <div id="discordActivity"></div>
                            <div id="discordPresence"></div>
                            <span class="discord-link-hint">Click to copy username</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="music-player">
            <div class="music-content">
                <div class="music-header">
                    <div class="album-art" id="albumArt">🎵</div>
                    <div class="song-info">
                        <div class="song-title" id="songTitle">No song playing</div>
                        <div class="artist-name" id="artistName">Add music</div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <span class="time-stamps" id="currentTime">0:00</span>
                    
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    
                    <span class="time-stamps" id="duration">0:00</span>
                </div>
                
                <div class="controls">
                    <button class="control-btn" id="prevBtn">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="control-btn play-btn" id="playBtn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-btn" id="nextBtn">
                        <i class="fas fa-step-forward"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            discord: {
                userId: '1388108985529405461',
                username: 'kyoma_renzaki'
            },
            social: {
                discord: 'https://discord.com/users/1388108985529405461',
                facebook: 'https://facebook.com/nguyen.vu.891782',
                instagram: 'https://instagram.com/nguyenvu10092009/',
                tiktok: 'https://tiktok.com/@kyoma_renzaki',
                roblox: 'https://www.roblox.com/users/3803841676/profile'
            },
            music: [
                {
                    title: 'From The Start',
                    artist: 'Laufey',
                    albumArt: 'https://cdn.discordapp.com/attachments/1447983902483284060/1465688283680870523/IMG_0918.jpg?ex=697a0416&is=6978b296&hm=f27bfd0403ce2fbf5b7153606172f70da0f8f50bdce7b32715742f4171235f93&',
                    src: 'https://files.catbox.moe/7klrdd.mp4'
                }
            ]
        };

        // ==================== DISCORD LANYARD API ====================
        async function fetchDiscordStatus() {
            try {
                console.log('🔄 Fetching Discord status...');
                const response = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discord.userId}`);
                const data = await response.json();
                
                if (data.success) {
                    console.log('✅ Discord data:', data.data);
                    updateDiscordUI(data.data);
                } else {
                    console.error('❌ Lanyard error:', data);
                    showOfflineStatus();
                }
            } catch (error) {
                console.error('❌ Fetch error:', error);
                showOfflineStatus();
            }
        }

        function updateDiscordUI(data) {
            // Update avatar
            if (data.discord_user && data.discord_user.avatar) {
                const format = data.discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
                const avatarUrl = `https://cdn.discordapp.com/avatars/${CONFIG.discord.userId}/${data.discord_user.avatar}.${format}?size=256`;
                document.getElementById('profileAvatar').src = avatarUrl;
                console.log('✅ Avatar updated');
            }

            // Update status
            const statusMap = {
                'online': { class: 'online', text: 'ONLINE' },
                'idle': { class: 'idle', text: 'IDLE' },
                'dnd': { class: 'dnd', text: 'DO NOT DISTURB' },
                'offline': { class: 'offline', text: 'OFFLINE' }
            };

            const status = statusMap[data.discord_status] || statusMap.offline;
            document.getElementById('statusIndicator').className = 'status-indicator ' + status.class;
            document.getElementById('profileImage').className = 'profile-image status-' + status.class;
            document.getElementById('statusBadge').className = 'status-badge ' + status.class;
            document.getElementById('statusDot').className = 'status-dot ' + status.class;
            document.getElementById('discordStatus').textContent = status.text;

            // Update activity
            const activityEl = document.getElementById('discordActivity');
            const presenceEl = document.getElementById('discordPresence');
            
            activityEl.style.display = 'none';
            presenceEl.style.display = 'none';

            // Check Spotify
            if (data.spotify) {
                activityEl.style.display = 'block';
                activityEl.innerHTML = `<i class="fab fa-spotify" style="color:#1DB954;"></i> Listening to <strong>${data.spotify.song}</strong> by ${data.spotify.artist}`;
                console.log('🎵 Spotify detected');
            }
            // Check activities
            else if (data.activities && data.activities.length > 0) {
                for (const activity of data.activities) {
                    // Custom status
                    if (activity.type === 4 && activity.state) {
                        let emoji = '💬';
                        if (activity.emoji) {
                            if (activity.emoji.id) {
                                emoji = `<img src="https://cdn.discordapp.com/emojis/${activity.emoji.id}.${activity.emoji.animated ? 'gif' : 'png'}" style="width:16px;height:16px;vertical-align:middle;">`;
                            } else if (activity.emoji.name) {
                                emoji = activity.emoji.name;
                            }
                        }
                        activityEl.style.display = 'block';
                        activityEl.innerHTML = `${emoji} <strong>CUSTOM STATUS</strong><br>${activity.state}`;
                        console.log('💬 Custom status detected');
                        break;
                    }
                    // Playing game
                    else if (activity.type === 0) {
                        activityEl.style.display = 'block';
                        activityEl.innerHTML = `🎮 Playing <strong>${activity.name}</strong>`;
                        
                        if (activity.details || activity.state) {
                            presenceEl.style.display = 'block';
                            const details = [activity.details, activity.state].filter(Boolean);
                            presenceEl.textContent = details.join(' • ');
                        }
                        console.log('🎮 Game detected');
                        break;
                    }
                }
            }
        }

        function showOfflineStatus() {
            document.getElementById('statusBadge').className = 'status-badge offline';
            document.getElementById('statusDot').className = 'status-dot offline';
            document.getElementById('discordStatus').textContent = 'OFFLINE';
            document.getElementById('discordActivity').style.display = 'block';
            document.getElementById('discordActivity').innerHTML = '⚙️ <strong>CONNECTING...</strong>';
        }

        // Start fetching Discord status
        fetchDiscordStatus();
        setInterval(fetchDiscordStatus, 5000);

        // ==================== SOCIAL LINKS ====================
        document.querySelectorAll('.social-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                const platform = this.getAttribute('data-link');
                const url = CONFIG.social[platform];
                
                if (url && !url.includes('your')) {
                    console.log('🔗 Opening:', url);
                    window.open(url, '_blank');
                } else {
                    console.warn('⚠️ No link configured for:', platform);
                }
                
                // Animation
                this.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 200);
            });
        });

        // ==================== WELCOME SCREEN ====================
        function enterSite() {
            document.body.classList.add('show-content');
            incrementViews();
            
            setTimeout(() => {
                const audio = document.getElementById('audioPlayer');
                if (audio.src && CONFIG.music[0].src) {
                    audio.play().then(() => {
                        isPlaying = true;
                        document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
                        document.getElementById('albumArt').classList.add('playing');
                    }).catch(err => {
                        console.log('Autoplay prevented');
                    });
                }
            }, 1000);
        }

        // ==================== VIEW & LIKE COUNTER ====================
        function incrementViews() {
            const viewCountEl = document.getElementById('viewCount');
            let currentViews = parseInt(localStorage.getItem('profileViews') || '100');
            currentViews++;
            viewCountEl.textContent = currentViews;
            localStorage.setItem('profileViews', currentViews);
        }

        let isLiked = localStorage.getItem('isLiked') === 'true';
        const likeIcon = document.getElementById('likeIcon');
        const likeCountEl = document.getElementById('likeCount');
        
        if (isLiked) {
            likeIcon.classList.add('liked');
        }

        function toggleLike() {
            isLiked = !isLiked;
            let currentLikes = parseInt(localStorage.getItem('profileLikes') || '1');
            
            if (isLiked) {
                currentLikes++;
                likeIcon.classList.add('liked');
                localStorage.setItem('isLiked', 'true');
            } else {
                currentLikes--;
                likeIcon.classList.remove('liked');
                localStorage.setItem('isLiked', 'false');
            }
            
            likeCountEl.textContent = currentLikes;
            localStorage.setItem('profileLikes', currentLikes);
        }

        const savedLikes = localStorage.getItem('profileLikes');
        if (savedLikes) likeCountEl.textContent = savedLikes;

        // ==================== STARS GENERATION ====================
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 4 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }

        // ==================== MUSIC PLAYER ====================
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIcon = document.getElementById('volumeIcon');
        const albumArt = document.getElementById('albumArt');
        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');

        let isPlaying = false;
        let currentSongIndex = 0;
        let playlist = CONFIG.music;

        function loadSong(index) {
            if (!playlist[index] || !playlist[index].src) {
                songTitle.textContent = 'No music added';
                artistName.textContent = 'Add songs to CONFIG.music';
                return;
            }
            
            const song = playlist[index];
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            audioPlayer.src = song.src;
            
            if (song.albumArt) {
                albumArt.innerHTML = `<img src="${song.albumArt}" alt="Album Art">`;
            } else {
                albumArt.innerHTML = '🎵';
            }
            
            currentTimeEl.textContent = '0:00';
            durationEl.textContent = '0:00';
            progressFill.style.width = '0%';
            
            audioPlayer.addEventListener('loadedmetadata', function updateDuration() {
                const duration = audioPlayer.duration;
                if (duration && !isNaN(duration) && isFinite(duration)) {
                    const minutes = Math.floor(duration / 60);
                    const seconds = Math.floor(duration % 60);
                    durationEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            });
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                albumArt.classList.remove('playing');
            } else {
                audioPlayer.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                albumArt.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        prevBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) audioPlayer.play();
        });

        nextBtn.addEventListener('click', () => {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) audioPlayer.play();
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration && !isNaN(audioPlayer.duration) && isFinite(audioPlayer.duration)) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressFill.style.width = progress + '%';
            }
            
            const currentTime = audioPlayer.currentTime;
            if (!isNaN(currentTime) && isFinite(currentTime)) {
                const minutes = Math.floor(currentTime / 60);
                const seconds = Math.floor(currentTime % 60);
                currentTimeEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
            
            if (durationEl.textContent === '0:00' && audioPlayer.duration) {
                const duration = audioPlayer.duration;
                if (!isNaN(duration) && isFinite(duration)) {
                    const minutes = Math.floor(duration / 60);
                    const seconds = Math.floor(duration % 60);
                    durationEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }
        });

        progressBar.addEventListener('click', (e) => {
            if (!audioPlayer.duration || isNaN(audioPlayer.duration) || !isFinite(audioPlayer.duration)) {
                return;
            }
            
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            audioPlayer.currentTime = (clickX / width) * duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            const volume = e.target.value;
            audioPlayer.volume = volume / 100;
            
            if (volume == 0) {
                volumeIcon.innerHTML = '<i class="fas fa-volume-mute"></i>';
            } else if (volume < 50) {
                volumeIcon.innerHTML = '<i class="fas fa-volume-down"></i>';
            } else {
                volumeIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
            }
        });

        audioPlayer.addEventListener('ended', () => {
            nextBtn.click();
        });

        audioPlayer.addEventListener('durationchange', () => {
            const duration = audioPlayer.duration;
            if (duration && !isNaN(duration) && isFinite(duration)) {
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60);
                durationEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });

        audioPlayer.addEventListener('canplay', () => {
            const duration = audioPlayer.duration;
            if (duration && !isNaN(duration) && isFinite(duration)) {
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60);
                durationEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });

        loadSong(0);

        // ==================== DISCORD WIDGET CLICK ====================
        document.getElementById('discordWidget').addEventListener('click', () => {
            navigator.clipboard.writeText(CONFIG.discord.username).then(() => {
                const originalText = document.getElementById('discordStatus').textContent;
                document.getElementById('discordStatus').textContent = '✓ COPIED!';
                setTimeout(() => {
                    fetchDiscordStatus();
                }, 2000);
            });
        });

        // ==================== CONTAINER TILT EFFECT ====================
        const container = document.querySelector('.container');
        
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 15;
            const rotateY = (centerX - x) / 15;
            
            container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        
        container.addEventListener('mouseleave', () => {
            container.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        });

        console.log('✅ All systems initialized');
        console.log('Discord ID:', CONFIG.discord.userId);
        console.log('Social links:', CONFIG.social);
    </script>
</body>
</html>
